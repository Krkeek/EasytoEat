name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      # 1. Install Tools (Fastest way via Brew)
      - name: Install Linting Tools
        run: |
          brew install swiftlint swiftformat

      # 2. Check Formatting
      - name: Run SwiftFormat
        run: swiftformat . --lint

      # 3. Check Style
      - name: Run SwiftLint
        run: swiftlint

      # 4. Build App
      # REPLACE 'YourProjectName' with your actual .xcodeproj name!
      - name: Build App
        run: |
          xcodebuild build \
            -scheme YourProjectName \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -quiet \
            CODE_SIGNING_ALLOWED=NO
